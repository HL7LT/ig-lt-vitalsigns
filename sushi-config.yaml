# ╭─────────────────────────Commonly Used ImplementationGuide Properties───────────────────────────╮
# │  The properties below are used to create the ImplementationGuide resource. The most commonly   │
# │  used properties are included. For a list of all supported properties and their functions,     │
# │  see: https://fshschool.org/docs/sushi/configuration/.                                         │
# ╰────────────────────────────────────────────────────────────────────────────────────────────────╯
id: lt.hl7.fhir.vitalsigns
canonical: https://hl7.lt/fhir/vitalsigns
name: LTVitalSigns
title: Lithuanian Vital Signs Implementation Guide
description: Lithuanian Vital Signs Implementation Guide
status: draft # draft | active | retired | unknown
version: 0.0.1
fhirVersion: 5.0.0 # https://www.hl7.org/fhir/valueset-FHIR-version.html
copyrightYear: 2025+
releaseLabel: ci-build
jurisdiction: urn:iso:std:iso:3166#LT #"Lithuania" temporarily disabled due to issues with IG publisher translation template
#jurisdiction: http://unstats.un.org/unsd/methods/m49/m49.htm#440 // Lithuania (Code 440 from UN M.49)
publisher:
  name: Lithuanian Medical Library
  url: https://medicinosnk.lt
  email: info@medicinosnk.lt

# don't change the order of dependencies!
dependencies:
  lt.hl7.fhir.base: 0.3.0
  lt.hl7.fhir.eu: 0.0.2
  hl7.fhir.eu.base-r5: 0.1.0


# The pages property corresponds to IG.definition.page. SUSHI can
# auto-generate the page list, but if the author includes pages in
# this file, it is assumed that the author will fully manage the
# pages section and SUSHI will not generate any page entries.
# The page file name is used as the key. If title is not provided,
# then the title will be generated from the file name.  If a
# generation value is not provided, it will be inferred from the
# file name extension.  Any subproperties that are valid filenames
# with supported extensions (e.g., .md/.xml) will be treated as
# sub-pages.
#
pages:
  index.md:
    title: Home
  profiles.md:
    title: Profiles
  guidance.md:
    title: Guidance
  terminology.md:
    title: Terminology
  examples.md:
    title: Examples
  changelog.md:
    title: Change Log
  translationinfo.md:
    title: Translation
