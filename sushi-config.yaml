#   validation: [allow-any-extensions, no-broken-links]
#
# ╭────────────────────────────────────────────menu.xml────────────────────────────────────────────╮
# │ The menu property will be used to generate the input/menu.xml file. The menu is represented    │
# │ as a simple structure where the YAML key is the menu item name and the value is the URL.       │
# │ The IG publisher currently only supports one level deep on sub-menus. To provide a             │
# │ custom menu.xml file, do not include this property and include a `menu.xml` file in            │
# │ input/includes. To use a provided input/includes/menu.xml file, delete the "menu"              │
# │ property below.                                                                                │
# ╰────────────────────────────────────────────────────────────────────────────────────────────────╯
menu:
  Home: index.html
  Profiles: profiles.html
  Guidance: guidance.html
  Terminology: terminology.html
  Examples: examples.html
  Change Log: changelog.html
  Artifacts: artifacts.html

# ╭───────────────────────────Less Common Implementation Guide Properties──────────────────────────╮
# │  Uncomment the properties below to configure additional properties on the ImplementationGuide  │
# │  resource. These properties are less commonly needed than those above.                         │
# ╰────────────────────────────────────────────────────────────────────────────────────────────────╯
#
# Those who need more control or want to add additional details to the contact values can use
# contact directly and follow the format outlined in the ImplementationGuide resource and
# ContactDetail.
#
# contact:
#   - name: Bob Smith
#     telecom:
#       - system: email # phone | fax | email | pager | url | sms | other
#         value: bobsmith@example.org
#         use: work
#
#
# The global property corresponds to the IG.global property, but it
# uses the type as the YAML key and the profile as its value. Since
# FHIR does not explicitly disallow more than one profile per type,
# neither do we; the value can be a single profile URL or an array
# of profile URLs. If a value is an id or name, SUSHI will replace
# it with the correct canonical when generating the IG JSON.
#
# global:
#   Patient: http://example.org/fhir/StructureDefinition/my-patient-profile
#   Encounter: http://example.org/fhir/StructureDefinition/my-encounter-profile
#
#
# The resources property corresponds to IG.definition.resource.
# SUSHI can auto-generate all of the resource entries based on
# the FSH definitions and/or information in any user-provided
# JSON or XML resource files. If the generated entries are not
# sufficient or complete, however, the author can add entries
# here. If the reference matches a generated entry, it will
# replace the generated entry. If it doesn't match any generated
# entries, it will be added to the generated entries. The format
# follows IG.definition.resource with the following differences:
#   * use IG.definition.resource.reference.reference as the YAML key.
#   * if the key is an id or name, SUSHI will replace it with the
#     correct URL when generating the IG JSON.
#   * specify "omit" to omit a FSH-generated resource from the
#     resource list.
#   * if the exampleCanonical is an id or name, SUSHI will replace
#     it with the correct canonical when generating the IG JSON.
#   * groupingId can be used, but top-level groups syntax may be a
#     better option (see below).
# The following are simple examples to demonstrate what this might
# look like:
#
# resources:
#   Patient/my-example-patient:
#     name: My Example Patient
#     description: An example Patient
#     exampleBoolean: true
#   Patient/bad-example: omit
#
#
# Groups can control certain aspects of the IG generation.  The IG
# documentation recommends that authors use the default groups that
# are provided by the templating framework, but if authors want to
# use their own instead, they can use the mechanism below.  This will
# create IG.definition.grouping entries and associate the individual
# resource entries with the corresponding groupIds. If a resource
# is specified by id or name, SUSHI will replace it with the correct
# URL when generating the IG JSON.
#
groups:
  profiles:
    name: Profiles
    description: Observation, Device, and BodyStructure profiles for vital signs
    resources:
      - StructureDefinition/blood-pressure-panel
      - StructureDefinition/body-height
      - StructureDefinition/bmi
      - StructureDefinition/body-weight
      - StructureDefinition/heart-rate
      - StructureDefinition/head-circumference
      - StructureDefinition/waist-circumference
      - StructureDefinition/device-blood-pressure
      - StructureDefinition/device-body-height
      - StructureDefinition/device-body-weight
      - StructureDefinition/device-heart-rate
      - StructureDefinition/body-structure-blood-pressure
  extensions:
    name: Extensions
    description: Extensions for vital signs context
    resources:
      - StructureDefinition/associated-situation
      - StructureDefinition/body-position
      - StructureDefinition/exercise-association
      - StructureDefinition/measurement-setting
      - StructureDefinition/sleep-status
  terminology:
    name: Terminology
    description: ValueSets and CodeSystems for vital signs
    resources:
      - ValueSet/bp-cuff-size
      - ValueSet/bp-panel-observation
      - ValueSet/bp-panel-observation-snomed
      - ValueSet/bp-systolic-observation
      - ValueSet/bp-systolic-observation-snomed
      - ValueSet/bp-diastolic-observation
      - ValueSet/bp-diastolic-observation-snomed
      - ValueSet/bp-mean-observation
      - ValueSet/bp-mean-observation-snomed
      - ValueSet/bp-unit
      - ValueSet/bp-measurement-body-location
      - ValueSet/bp-measurement-method
      - ValueSet/heart-rate-observation
      - ValueSet/heart-rate-observation-snomed
      - ValueSet/heart-rate-measurement-body-location
      - ValueSet/heart-rate-measurement-method
      - ValueSet/body-height-observation
      - ValueSet/body-height-observation-snomed
      - ValueSet/body-weight-observation
      - ValueSet/body-weight-observation-snomed
      - ValueSet/bmi-observation
      - ValueSet/bmi-observation-snomed
      - ValueSet/bmi-unit
      - ValueSet/body-length-unit
      - ValueSet/body-weight-associated-situation
      - ValueSet/vital-signs-rate-unit
      - ValueSet/height-length-measurement-method
      - ValueSet/head-circumference-observation
      - ValueSet/head-circumference-observation-snomed
      - ValueSet/waist-circumference-observation-loinc
      - ValueSet/waist-circumference-observation-snomed
      - ValueSet/waist-circumference-result-interpretation
      - ValueSet/device-type-blood-pressure
      - ValueSet/device-type-height-length
      - ValueSet/device-type-weight
      - ValueSet/device-type-heart-rate
      - ValueSet/vital-signs-body-position
      - ValueSet/vital-signs-sleep-status
      - ValueSet/exertion-phase
      - ValueSet/measurement-environment
      - ValueSet/numeric-result-interpretation
      - ValueSet/numeric-result-interpretation-non-panic
      - CodeSystem/snomed-vitalsigns-extension
  examples:
    name: Examples
    description: Example instances for vital signs and devices
    resources:
      - Patient/patient-example
      - Observation/observation-blood-pressure-example
      - Observation/observation-heart-rate-example
      - Observation/observation-body-height-example
      - Observation/observation-body-weight-example
      - Observation/observation-bmi-example
      - Observation/observation-head-circumference-example
      - Observation/observation-waist-circumference-example
      - Device/device-blood-pressure-example
      - Device/device-body-height-example
      - Device/device-body-weight-example
      - Device/device-heart-rate-example
      - BodyStructure/bodystructure-blood-pressure-example
#
# The ImplementationGuide resource defines several other properties
# not represented above. These properties can be used as-is and
# should follow the format defined in ImplementationGuide:
# * date
# * meta
# * implicitRules
# * language
# * text
# * contained
